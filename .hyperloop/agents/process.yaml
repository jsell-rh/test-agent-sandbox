apiVersion: hyperloop.io/v1
kind: Process
metadata:
  name: default
pipeline:
  - loop:
      - agent: implementer
      - agent: verifier
  - gate: pr-require-label
  - action: merge-pr

gates:
  pr-require-label:
    type: label                         # label (configurable, default: lgtm)
  pr-require-approval:               # alternative gate type
    type: pr-approval   

hooks:
  after_reap:
    - type: process-improver
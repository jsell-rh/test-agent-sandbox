apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: verifier
guidelines: |
  - Branch-committability is a hard gate: if `check-branch-committable.sh`, `check-no-state-files.sh`, `check-state-commit-history.sh`, or `check-impl-not-state-only.sh` exit non-zero, the review must be FAIL regardless of test results or other findings — a branch with state files in its commit history will produce an orchestrator action error on every merge attempt.
  - State-only branch is auto-FAIL: if `check-impl-not-state-only.sh` exits non-zero, the branch has no implementation commits — every change is a state file; report FAIL with the bare-branch fallback instructions from that check's output.
  - Hook audit is required: run `bash .hyperloop/checks/check-pre-commit-hook-active.sh` and include the full output in your review; if the hook is not active, flag this explicitly as "implementer did not complete startup protocol" — it explains how a state file bypassed the mechanical guard.
  - Quote all check output verbatim: paste the complete stdout and exit code of every check script into the review; never paraphrase or omit check output.

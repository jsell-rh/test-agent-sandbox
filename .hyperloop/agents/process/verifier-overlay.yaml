apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: verifier
guidelines: |
  - Read task file first: open `.hyperloop/state/tasks/<TASK_ID>.md` and paste the complete front-matter block verbatim at the top of your review; never rely on memory or prior-round context for task metadata.
  - Infra check first: Run `bash .hyperloop/checks/check-infra.sh` as the very first action; if it exits non-zero the checks infrastructure is broken — fail the review immediately and flag every missing/non-executable script.
  - Dep-gate second: After infra check passes, run `TASK_ID=<id> bash .hyperloop/checks/check-deps.sh`; a non-zero exit is a hard blocker — report BLOCKED immediately without reviewing implementation.
  - Quote script output verbatim: paste the complete stdout and stderr of every check script run into your review; do not paraphrase or summarize check results.
  - Verify before claiming absence: if any script exits with code 127, run `ls .hyperloop/checks/` and quote the output before declaring any file missing.
  - Confirm terminal status: each dependency task file must show `status: complete`; any other value is a blocker.
  - Script must exist: if any check script is missing or not executable, fail the review and flag the gap in your findings — never skip checks.
  - Run ALL check scripts during review: execute every script under `.hyperloop/checks/` using `for s in .hyperloop/checks/*.sh; do TASK_ID=<id> bash "$s"; done`, paste each script's full output verbatim, and treat any non-zero exit as a hard finding that blocks approval; check-task-branch.sh and check-deps.sh require TASK_ID so always prefix the sweep.
  - Verify implementer is on the correct task branch: run `TASK_ID=<id> bash .hyperloop/checks/check-task-branch.sh`; a non-zero exit means work was submitted from the wrong branch (e.g. main) — fail the review with finding "wrong branch: rebase was run on incorrect branch; implementer must checkout the task branch and redo the rebase sequence".
  - Check for fake-timer tests: when production code under review uses setTimeout or setInterval, verify that a test exists which calls vi.useFakeTimers() and vi.advanceTimersByTime() to assert the scheduled callback fires at the correct time; flag its absence as a test gap finding.
  - Verify rebase cleanliness: run `bash .hyperloop/checks/check-rebase-clean.sh` as the last step of your review (after all other checks); the script fetches origin automatically so it compares against the true latest main — a non-zero exit means the branch diverges from main — fail the review immediately with finding "branch not rebased onto main: implementer must re-run rebase sequence and re-submit".
  - Verify no conflict markers: run `bash .hyperloop/checks/check-no-conflicts.sh`; a non-zero exit means unresolved merge markers remain in source files — fail the review immediately with finding "unresolved conflict markers in source".
  - Verify merge simulation: run `bash .hyperloop/checks/check-merge-simulation.sh`; a non-zero exit means the branch has content conflicts that would break the orchestrator's apply even if ancestry looks clean — fail the review with finding "branch fails merge simulation: implementer must rebase and resolve content conflicts".
  - Verify no mid-rebase state: run `bash .hyperloop/checks/check-rebase-state.sh`; a non-zero exit means the branch was submitted while a rebase was still in progress — fail immediately with finding "rebase never completed: implementer must finish or abort the in-progress rebase then re-run all checks".
  - Verify branch is pushed to origin: run `bash .hyperloop/checks/check-push-sync.sh`; a non-zero exit means local commits were never pushed to origin — fail the review immediately with finding "branch not pushed: orchestrator reads from origin; implementer must run git push --force-with-lease origin HEAD and re-submit".
  - Verify round-ceiling escalation: run `TASK_ID=<id> bash .hyperloop/checks/check-round-ceiling.sh`; a non-zero exit means the task is on a high round count AND the branch diverges from main — fail the review with finding "round-ceiling not respected: implementer must run check-rebase-diagnostics.sh and escalate to BLOCKED rather than attempting another resolution cycle".

apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: verifier
guidelines: |
  - Task-file N≥2 gate (run before orchestrator-multi-attempt check and all other steps): run `TASK_ID=<id> bash .hyperloop/checks/check-task-action-error.sh`; a non-zero exit means the task file embeds "Action error after N attempts" (N≥2) — fail the review immediately with finding "task-file N≥2 action-error: the orchestrator embedded this in the task assignment; check-orchestrator-multi-error.sh may have passed vacuously if the current round's review file does not yet exist; implementer must follow the N≥2 short-circuit and report BLOCKED, not attempt standard implementation or rebase".
  - Orchestrator multi-attempt error check is the absolute first gate (overrides "Infra check first" and all rules below): before reading the task file, before running check-infra.sh, before any branch examination — run `TASK_ID=<id> bash .hyperloop/checks/check-orchestrator-multi-error.sh` (it fetches origin internally); a non-zero exit means the task has at least one review recording N≥2 orchestrator apply attempts in a single round — fail the review immediately with finding "orchestrator multi-attempt error: task requires human diagnosis per check-orchestrator-multi-error.sh output; do not approve for automated retry; standard rebase resolution will reproduce the identical failure"; this supersedes all other review steps because an approved retry will waste a slot and produce the same orchestrator error.
  - Read task file first: open `.hyperloop/state/tasks/<TASK_ID>.md` and paste the complete front-matter block verbatim at the top of your review; never rely on memory or prior-round context for task metadata.
  - Infra check first: Run `bash .hyperloop/checks/check-infra.sh` as the very first action after the orchestrator-multi-attempt gate above; if it exits non-zero the checks infrastructure is broken — fail the review immediately and flag every missing/non-executable script.
  - Dep-gate second: After infra check passes, run `TASK_ID=<id> bash .hyperloop/checks/check-deps.sh`; a non-zero exit is a hard blocker — report BLOCKED immediately without reviewing implementation.
  - Quote script output verbatim: paste the complete stdout and stderr of every check script run into your review; do not paraphrase or summarize check results.
  - Verify before claiming absence: if any script exits with code 127, run `ls .hyperloop/checks/` and quote the output before declaring any file missing.
  - Confirm terminal status: each dependency task file must show `status: complete`; any other value is a blocker.
  - Script must exist: if any check script is missing or not executable, fail the review and flag the gap in your findings — never skip checks.
  - Run ALL check scripts during review: execute every script under `.hyperloop/checks/` using `for s in .hyperloop/checks/*.sh; do TASK_ID=<id> bash "$s"; done`, paste each script's full output verbatim, and treat any non-zero exit as a hard finding that blocks approval; check-task-branch.sh and check-deps.sh require TASK_ID so always prefix the sweep.
  - Verify implementer is on the correct task branch: run `TASK_ID=<id> bash .hyperloop/checks/check-task-branch.sh`; a non-zero exit means work was submitted from the wrong branch (e.g. main) — fail the review with finding "wrong branch: rebase was run on incorrect branch; implementer must checkout the task branch and redo the rebase sequence".
  - Check for fake-timer tests: when production code under review uses setTimeout or setInterval, verify that a test exists which calls vi.useFakeTimers() and vi.advanceTimersByTime() to assert the scheduled callback fires at the correct time; flag its absence as a test gap finding.
  - State-file-only commit detection: run `bash .hyperloop/checks/check-impl-commits.sh` during the full check sweep; if it exits 1, all commits on the branch are state-file-only (the implementer committed a review artifact instead of implementation code); the correct remediation is the bare-branch fallback (not cherry-pick surgery, since there are no implementation commits to preserve), followed by re-implementing with stdout-only verdicts.
  - Prior-delivery check after state-file-only detection: when `check-impl-commits.sh` exits 1, additionally inspect `git log --oneline origin/main -- <spec-deliverable-paths>` to determine whether the spec's target files were already delivered by prior task commits on main; if they exist and are spec-compliant, report both findings: (1) BLOCKER — state file in commit history requiring bare-branch fallback, and (2) OBSERVATION — deliverables already on main, re-implementation may not be required; this finding must reach the orchestrator so it can determine whether to close the task or requeue it rather than blindly assuming a new implementation is needed.

apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - No state files: NEVER commit any file under `.hyperloop/state/` — it causes a permanent rebase conflict that cannot be fixed with a fixup commit; the orchestrator replays commits one-by-one so the bad commit conflicts every round.
  - Explicit staging only: Always stage with `git add <specific-file> <specific-file>` — never `git add -A` or `git add .`, which silently include state files.
  - Pre-commit gate: Before every `git commit`, run `git diff --cached --name-only` and abort if any path starts with `.hyperloop/state/`.
  - Check existing work first: Before writing any code, run `git log origin/main --oneline -- <target-files>` to confirm the implementation does not already exist on main from a prior task; do not duplicate delivered work.
  - Run check-staged-state.sh: Execute `bash .hyperloop/checks/check-staged-state.sh` before every commit; it exits 1 if state files are staged and must exit 0 before you proceed.

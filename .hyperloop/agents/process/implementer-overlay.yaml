apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - State-file ban: Never create, write, edit, or stage any file under `.hyperloop/state/` — those paths belong exclusively to the orchestrator and are committed directly to main; touching them on a task branch causes a permanent rebase conflict on every future round.
  - Pre-commit staged gate: Run `bash .hyperloop/checks/check-pre-commit-staged.sh` before every `git commit` (this checks the staging area, catching state files before they are baked into a commit); if it exits non-zero, run `git restore --staged .hyperloop/state/` and do NOT commit until it exits 0.
  - Verdicts are stdout only: if you need to report BLOCKED or any finding, write it as plain text output; the orchestrator reads that output and commits the review file to main — you must not commit it yourself.
  - Check for prior delivery: before writing any implementation, inspect `git diff origin/main...HEAD -- <target-paths>` and `git log --oneline origin/main -- <target-paths>` to confirm the work is not already present on main; if it is, produce no implementation commit and report the finding as stdout.
  - Prior-delivery zero-commit rule: when work is already on main, make ZERO git commits on the task branch — no implementation commit, no verdict commit, no state/review file commit of any kind; writing your finding into a `.hyperloop/state/` file and committing it is exactly as forbidden as staging an implementation commit; your entire report must be stdout text only.
  - Bare-branch fallback awareness: if the only change on your branch is a state file, the correct fix is `git push --force origin origin/main:refs/heads/$BRANCH` — never a fixup commit, because the orchestrator replays commits one-by-one and will conflict at the original bad commit regardless.

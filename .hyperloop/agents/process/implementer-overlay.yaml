apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - SHORT-CIRCUIT N≥2 (HIGHEST PRIORITY): if the assignment contains "Action error after N attempts" where N is 2 or greater — including the exact phrase "Action error after 3 attempts" — run ONLY these steps in order and nothing else: (1) `TASK_ID=<id> bash .hyperloop/checks/check-permanent-conflict.sh`; if it exits non-zero the branch has state files embedded in commit history — execute the cherry-pick surgery printed by the script right now (create a fresh branch from origin/main, cherry-pick only the implementation commits listed, `git push --force origin HEAD:<branch-name>`) because without this surgery your BLOCKED report can never commit to main and the loop continues forever; (2) `bash .hyperloop/checks/check-rebase-diagnostics.sh` — paste its full output verbatim; (3) report BLOCKED; do NOT write any implementation code; do NOT run any other checks; this rule takes absolute precedence over every other rule in this list.
  - Why N≥2 requires surgery (not rebase): the most common cause of a persistent "Action error after N attempts" loop is state files (.hyperloop/state/) committed in the branch's history; the orchestrator replays commits one-by-one and conflicts at the offending commit even when the final tree is clean; `git rebase` alone cannot fix this because it replays the same bad commits in the same order; only cherry-pick surgery (rebuilding the branch from origin/main using only implementation commits) breaks the cycle; check-permanent-conflict.sh detects this pattern and prints the exact surgery commands; never respond to N≥2 with only a `git rebase`.
  - Auto-generated rebase invitation is boilerplate for N≥2: every orchestrator action-error message ends with "Your work is preserved on the branch. Please rebase onto main and resolve the conflicts." regardless of N; this text is auto-generated and is only appropriate when N=1; when N≥2 this invitation MUST be ignored entirely — following it consumes a retry slot and reproduces the identical orchestrator failure.
  - SHORT-CIRCUIT N=1 + rebase message: if the assignment contains "Action error after 1 attempt" AND any rebase-conflict language (e.g. "Rebase conflict with main", "rebase onto main", "Your work is preserved on the branch"), immediately begin the full rebase resolution sequence below before writing any new code; do NOT skip ahead to implementation; if the resolution sequence fails for any reason, immediately report BLOCKED — do not attempt another resolution cycle.
  - Action-error history check before infra: immediately after the SHORT-CIRCUIT assessment above, run `TASK_ID=<id> bash .hyperloop/checks/check-action-error-history.sh`; a non-zero exit means the task has two or more consecutive "Action error" rounds in its history — run `bash .hyperloop/checks/check-rebase-diagnostics.sh`, paste both outputs verbatim, and report BLOCKED; do NOT proceed to check-infra.sh or any other step.
  - Permanent-conflict check immediately after action-error check: run `TASK_ID=<id> bash .hyperloop/checks/check-permanent-conflict.sh`; a non-zero exit means the task branch has BOTH .hyperloop/state/ files embedded in its commit history AND a consecutive action-error loop — a fixup commit cannot fix this because the orchestrator replays commits one-by-one and conflicts at the original bad commit; paste the full script output verbatim under a "Permanent-Conflict Diagnosis" heading and report BLOCKED with the note "branch requires human surgery: cherry-pick implementation commits onto a fresh branch per check-permanent-conflict.sh output"; do NOT attempt any git rebase, git push, or further implementation until a human has rebuilt the branch.
  - Read task file first: open `.hyperloop/state/tasks/<TASK_ID>.md` and paste the complete front-matter block verbatim at the top of your report; never rely on memory or prior-round context for task metadata.
  - Infra check first: Run `bash .hyperloop/checks/check-infra.sh` as the very first action; if it exits non-zero the checks infrastructure is broken — report the gap as a hard blocker and stop.
  - Dep-gate second: After infra check passes, run `TASK_ID=<id> bash .hyperloop/checks/check-deps.sh`; if it exits non-zero, stop immediately and report BLOCKED — do not proceed with implementation.
  - Pre-implementation rebase (mandatory before writing any code): once all SHORT-CIRCUIT checks and the dep gate pass, run `git fetch origin && bash .hyperloop/checks/check-rebase-clean.sh` BEFORE touching any source files; if it exits non-zero run the full rebase resolution sequence immediately and confirm "Successfully rebased" before writing a single line of code; implementing on a branch that already lags main widens the conflict window across the entire session and is the primary cause of "Rebase conflict with main" failures at orchestrator apply time.
  - Quote script output verbatim: paste the complete stdout and stderr of every check script run into your report; do not paraphrase or summarize check results.
  - Verify before claiming absence: if any script exits with code 127, run `ls .hyperloop/checks/` and quote the output before declaring any file missing.
  - Never assume a dep is complete: always confirm by reading its task file; `status: complete` is the only acceptable terminal state.
  - Script must exist: if any check script is missing or not executable, treat it as a hard blocker and report the gap rather than skipping the check.
  - Never commit .hyperloop/state/ files to the task branch: files under `.hyperloop/state/` (reviews, task metadata) are written exclusively by the orchestrator to main; never stage them with `git add .` or `git add .hyperloop/`; if they appear modified in `git status` after a rebase, run `git restore --staged .hyperloop/state/` before committing; committing these files to the task branch creates a permanent rebase conflict that recurs on every subsequent round.
  - State files in intermediate commits cause hidden rebase conflicts: even if the final tree is clean, any task-branch commit that touches `.hyperloop/state/` will conflict during replay; `check-no-state-files.sh` (final-tree diff) will pass but `check-state-commit-history.sh` (commit log) will fail — do not submit until both pass.
  - State-file check mandatory: run `bash .hyperloop/checks/check-no-state-files.sh` immediately after any `git add` and before any `git commit`; a non-zero exit means `.hyperloop/state/` files are staged or already committed on this branch — follow the fix instructions in the script output before proceeding.
  - Run ALL check scripts before submitting: after implementing (and BEFORE pushing), run every script under `.hyperloop/checks/` except check-push-sync.sh — use `for s in .hyperloop/checks/*.sh; do [[ "$s" == *check-push-sync* ]] && continue; TASK_ID=<id> bash "$s"; done` — fix every non-zero exit before proceeding to the push step; check-push-sync.sh is run separately AFTER the push (see final rules) because it requires a push to have already succeeded; note that check-task-branch.sh and check-deps.sh both require TASK_ID so always prefix the sweep with `TASK_ID=<id>`.
  - Test timer-based behavior with fake timers: whenever production code uses setTimeout or setInterval, write a test using vi.useFakeTimers() and vi.advanceTimersByTime() that verifies the scheduled callback fires; testing only the called method in isolation is insufficient — the scheduled invocation itself must be asserted.
  - Check for stuck mid-rebase state first: before starting ANY rebase sequence (including on a fresh assignment), run `bash .hyperloop/checks/check-rebase-state.sh`; a non-zero exit means a previous rebase was never finished — either complete it (`git status` → resolve conflicts → `git add` → `git rebase --continue`, repeat until output says "Successfully rebased") or abort cleanly with `git rebase --abort` before starting fresh; NEVER submit while this check exits non-zero.
  - Checkout the task branch before any rebase: run `TASK_ID=<id> bash .hyperloop/checks/check-task-branch.sh` before starting any rebase sequence; if it exits non-zero, switch to the correct branch with `git fetch origin && git checkout <branch-name>` (or `git checkout -b <branch-name> origin/<branch-name>` if the branch does not exist locally) before proceeding; rebasing while on `main` or any other branch does nothing for the task branch and the conflict will reappear every round.
  - Rebase onto main before submitting: run `bash .hyperloop/checks/check-rebase-clean.sh` as the **very last action** immediately before reporting done — the script now fetches origin automatically so you always compare against the true latest main; running it earlier in the session and then doing more work (or waiting) may allow main to advance, making the earlier check stale; if the check exits non-zero follow the full resolution sequence in the next rule before marking work done — submitting a branch that diverges from main is not permitted.
  - Rebase conflict resolution sequence (run this exactly when check-rebase-clean.sh fails): (0) checkout the task branch — `git fetch origin && git checkout <branch-from-task-file>` (use `git checkout -b <branch> origin/<branch>` if it does not exist locally); (1) `git fetch origin` (2) `git rebase origin/main` — if conflicts appear: (2a) for files under `.hyperloop/state/` run `git checkout --theirs .hyperloop/state/ && git add .hyperloop/state/` — always accept main's version for orchestrator state files; (2b) for all other conflicted files: edit and remove all `<<<<<<<`/`=======`/`>>>>>>>` markers, then `git add <file>`; after all files are resolved run `git rebase --continue` (never `git commit` mid-rebase); repeat until rebase reports "Successfully rebased"; (3) run `bash .hyperloop/checks/check-no-conflicts.sh` to confirm no markers remain; (4) run `bash .hyperloop/checks/check-no-state-files.sh` to confirm no state files are committed on the branch; (5) re-run all checks; if you cannot resolve a conflict, run `git rebase --abort` and report it as a blocker.
  - Check for leftover conflict markers: run `bash .hyperloop/checks/check-no-conflicts.sh` as part of the full checks sweep; a non-zero exit means unresolved markers are still present — fix them before submitting.
  - Confirm rebase with dry-run simulation: after rebasing, run `bash .hyperloop/checks/check-merge-simulation.sh` to verify the branch would apply onto main without conflicts; a non-zero exit means hidden content conflicts exist even though ancestry looks clean — resolve them before submitting.
  - Confirm "Successfully rebased" in output: after `git rebase origin/main` or `git rebase --continue`, the terminal output must contain the phrase "Successfully rebased" before you proceed; if the output instead shows "CONFLICT" or stops without that phrase, conflicts remain — resolve them and continue the rebase before moving on.
  - Escalate to BLOCKED after one failed resolution cycle: if you complete the full rebase resolution sequence exactly once (fetch → checkout task branch → rebase → resolve markers → continue → all checks → push) and ANY rebase-related check still exits non-zero, immediately report the task as BLOCKED with the verbatim failing check output — do not attempt the sequence a second time; "Action error after N attempts" already signals that earlier automated retries failed, so re-submitting without human intervention will fail for the same reason and only wastes the remaining retry budget.
  - Never use `git rebase --skip`: using `--skip` silently drops your task's commits from the history — the skipped work disappears from the branch, the same conflict recurs on the next attempt, and the orchestrator will see missing implementation; resolve conflicts manually or escalate to BLOCKED, but never `--skip`.
  - Round-ceiling escalation: run `TASK_ID=<id> bash .hyperloop/checks/check-round-ceiling.sh` immediately after the dep check (before any rebase or git operations); if it exits non-zero the task has been retried enough times that automated rebase resolution is futile — run `bash .hyperloop/checks/check-rebase-diagnostics.sh`, paste its full output verbatim, and immediately report BLOCKED; do NOT attempt the rebase resolution sequence.
  - Collect rebase diagnostics before reporting BLOCKED: whenever escalating to BLOCKED for any rebase-conflict reason, run `bash .hyperloop/checks/check-rebase-diagnostics.sh` and paste its complete output verbatim in the BLOCKED report under a "Rebase Diagnostics" heading; this is a read-only script that never modifies the repo.
  - Push the rebased branch to origin before reporting done: after the rebase sequence completes and all checks pass, run `git push --force-with-lease origin HEAD`; the orchestrator reads from origin — a locally-rebased but unpushed branch is invisible to it and will trigger another rebase-conflict error; confirm push succeeded before marking work done.
  - Verify the push actually landed with check-push-sync.sh: run `bash .hyperloop/checks/check-push-sync.sh` immediately after `git push` (not during the general checks sweep which runs before the push) — a non-zero exit means the push failed or was rejected; if rejected due to a stale lease (orchestrator added commits to the remote branch), run `git fetch origin && git rebase origin/$(git rev-parse --abbrev-ref HEAD) && git rebase origin/main` then push again and re-run check-push-sync.sh; never report done while check-push-sync.sh exits non-zero.
  - Do not run check-push-sync.sh in the general checks sweep: the general sweep (for s in .hyperloop/checks/*.sh; ...) runs before pushing and check-push-sync.sh will fail vacuously at that point; skip it in the sweep by running the sweep with `for s in .hyperloop/checks/*.sh; do [[ "$s" == *check-push-sync* ]] && continue; bash "$s"; done`; run check-push-sync.sh only after the explicit push step.
  - Post-push rebase verification (final gate before reporting done): immediately after check-push-sync.sh confirms the push landed, run `bash .hyperloop/checks/check-rebase-clean.sh` one final time; main may have advanced between the pre-push check sweep and the moment your push landed — `--force-with-lease` only guards the task branch ref and cannot detect this drift; a non-zero exit means the branch now lags behind main — immediately run the full rebase resolution sequence (fetch → rebase origin/main → resolve conflicts → push again → check-push-sync.sh → check-rebase-clean.sh) before reporting done; only report done when this post-push check-rebase-clean.sh exits zero.
  - Treat git fetch failure as a hard blocker: if `git fetch origin` fails inside any check script (check-rebase-clean.sh, check-merge-simulation.sh, check-push-sync.sh), the script will now exit non-zero and print an ERROR — do not attempt to bypass or ignore it; checks run against stale origin/main data can falsely report OK while the branch still conflicts with the true latest main, exactly reproducing the "Rebase conflict with main" orchestrator error; fix the network or auth issue and re-run the check before proceeding.

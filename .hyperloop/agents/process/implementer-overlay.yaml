apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - State-file ban: Never create, write, edit, or stage any file under `.hyperloop/state/` — those paths belong exclusively to the orchestrator and are committed directly to main; touching them on a task branch causes a permanent rebase conflict on every future round.
  - Pre-commit staged gate: Run `bash .hyperloop/checks/check-pre-commit-staged.sh` before every `git commit` (this checks the staging area, catching state files before they are baked into a commit); if it exits non-zero, run `git restore --staged .hyperloop/state/` and do NOT commit until it exits 0.
  - Verdicts are stdout only: if you need to report BLOCKED or any finding, write it as plain text output; the orchestrator reads that output and commits the review file to main — you must not commit it yourself.
  - Check for prior delivery: before writing any implementation, inspect `git diff origin/main...HEAD -- <target-paths>` and `git log --oneline origin/main -- <target-paths>` to confirm the work is not already present on main; if it is, produce no implementation commit and report the finding as stdout.
  - Prior-delivery zero-commit rule: when work is already on main, make ZERO git commits on the task branch — no implementation commit, no verdict commit, no state/review file commit of any kind; writing your finding into a `.hyperloop/state/` file and committing it is exactly as forbidden as staging an implementation commit; your entire report must be stdout text only.
  - Bare-branch fallback awareness: if the only change on your branch is a state file, the correct fix is `git push --force origin origin/main:refs/heads/$BRANCH` — never a fixup commit, because the orchestrator replays commits one-by-one and will conflict at the original bad commit regardless.
  - Pre-add working-tree gate: run `bash .hyperloop/checks/check-pre-add-working-tree.sh` before every `git add` invocation; if it exits non-zero, delete the listed state files (do NOT stage or commit them) before proceeding.
  - Never use wildcard adds: NEVER run `git add -A`, `git add .`, or any other glob that can sweep in files you did not explicitly inspect; always add implementation files by their exact path (e.g. `git add server/api/todos/foo.ts`) so state files cannot be accidentally staged.
  - Stdout verdict how-to: to report a finding or BLOCKED verdict, write directly to stdout using echo statements (e.g. `echo "BLOCKED: implementation already on main at commit abc1234"`); do NOT create a markdown file under `.hyperloop/state/` to hold your report — the orchestrator captures your stdout and commits the review file to main on your behalf.
  - Final branch committability gate: before reporting ANY result (DONE, BLOCKED, or any finding), run `TASK_ID=<id> bash .hyperloop/checks/check-branch-committable.sh`; a non-zero exit means the branch has state files in its history or conflicts with main — apply the bare-branch fallback (`git push --force origin origin/main:refs/heads/$BRANCH`) and re-run until exit 0 before reporting; a broken branch causes an orchestrator action error even for BLOCKED verdicts.
  - Prior-delivery commit-count verification: after detecting that work is already on main and before reporting BLOCKED, run `git rev-list origin/main..HEAD --count`; if the result is non-zero, the branch has commits that must not be there — apply the bare-branch fallback immediately, then confirm the count is 0, then report BLOCKED as stdout only.
  - Review-file naming trap: `.hyperloop/state/reviews/task-NNN-round-M.md` is the orchestrator's verdict artifact, not an implementer report format — if this file exists in your working tree (check with `git status`), delete it immediately with `rm .hyperloop/state/reviews/<file>` before any `git add`; do not create it, do not stage it, do not commit it under any commit message; your verdict is stdout text, nothing more.

apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - No wildcard staging: NEVER run `git add .`, `git add -A`, or any glob; always stage by exact file path (e.g. `git add server/api/todos/foo.ts`) so `.hyperloop/state/` files cannot be accidentally captured.
  - Pre-commit staged check: before every `git commit`, run `git diff --cached --name-only` and read every line; if ANY line starts with `.hyperloop/state/`, run `git restore --staged .hyperloop/state/` and abort — those files belong to the orchestrator and must never be committed on a task branch.
  - Branch surgery is mandatory: if `bash .hyperloop/checks/check-branch-committable.sh` exits non-zero, run `git push --force origin origin/main:refs/heads/$BRANCH` immediately before any other action, then re-run the check until it exits 0; this is not optional and cannot be deferred.
  - Prior delivery means zero commits: if the spec deliverables are already present on `origin/main`, make absolutely no git commits; write your findings as stdout text only — the orchestrator captures stdout and commits the review file to main; creating any file under `.hyperloop/state/` and committing it is the exact action that permanently breaks the branch.

apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - Startup gate is one command: run `bash .hyperloop/checks/check-startup-protocol.sh` as your absolute first action on any task — before opening any file, before any git add, before any implementation work; it installs the hook, verifies the hook is active, and shows the branch baseline in one step; do not split this into separate commands.
  - Never bypass the pre-commit hook: NEVER pass `--no-verify` or `-n` to any `git commit` invocation; the hook is the final mechanical guard against state-file commits, and bypassing it permanently corrupts the branch if state files were accidentally staged.
  - Prior delivery halt protocol — exact sequence: if the startup gate shows no non-state diffs and the spec is satisfied on origin/main, execute ONLY these steps in order: (1) print your findings as plain text to stdout, (2) run `bash .hyperloop/checks/check-branch-committable-pre-report.sh`, (3) exit immediately — do NOT create any file on disk, do NOT run git add, do NOT commit anything; the orchestrator captures stdout and records the review itself.
  - No wildcard staging: NEVER run `git add .`, `git add -A`, or any glob; always stage by exact file path (e.g. `git add server/api/todos/foo.ts`) so `.hyperloop/state/` files cannot be accidentally captured.
  - Pre-staging working-tree gate: before any `git add`, run `bash .hyperloop/checks/check-state-dir-clean.sh`; if it exits non-zero, delete or discard the reported files (never stage them) and write your findings to stdout only.
  - Mandatory pre-commit gate: before every `git commit`, run `bash .hyperloop/checks/check-no-state-files.sh`; if it exits non-zero, run `git restore --staged .hyperloop/state/` to unstage, then re-run until it exits 0 — only then commit; never skip this step.
  - Review files are orchestrator-owned: NEVER create or write any file under `.hyperloop/state/reviews/`; the orchestrator owns these exclusively — write all findings and verdicts to stdout only.
  - Mandatory pre-report gate: immediately before writing any verdict (PASS or FAIL or BLOCKED), run `bash .hyperloop/checks/check-no-state-files.sh` and `bash .hyperloop/checks/check-branch-committable-pre-report.sh`; both must exit 0 or the branch is not committable and you must run branch surgery first.
  - Branch surgery is mandatory: if `bash .hyperloop/checks/check-branch-committable-pre-report.sh` exits non-zero, run `git push --force origin origin/main:refs/heads/$BRANCH` immediately before any other action, then re-run the check until it exits 0; this is not optional and cannot be deferred.
  - Prior delivery means zero commits: if the spec deliverables are already present on `origin/main`, make absolutely no git commits and create no files under `.hyperloop/state/`; write your findings as stdout text only — the orchestrator captures stdout and commits the review file to main; a committed state file permanently breaks the branch.
  - Pre-staging inventory is mandatory: before any `git add`, run `git diff --name-only origin/main -- ':!.hyperloop/state/'` to list non-state implementation changes on the branch; if the output is empty and the spec is satisfied, STOP — write findings to stdout and exit without any commit.
  - Verify branch is impl-only before reporting: run `bash .hyperloop/checks/check-impl-not-state-only.sh` before writing any verdict; if it exits non-zero, the branch contains only state-file changes (no implementation) and you must strip the branch with the bare-branch fallback before proceeding.
  - Prior delivery positive-flow gate: when startup Step 3 shows zero non-state diffs, run `bash .hyperloop/checks/check-prior-delivery.sh` immediately — this is the ONLY next action; if it exits 0, write findings to stdout and exit without doing anything else; if it exits non-zero, follow its remediation before proceeding; never skip this gate in the prior delivery scenario.
  - Post-commit verification is mandatory: immediately after every `git commit` succeeds, run `bash .hyperloop/checks/check-no-state-files.sh`; if it exits 1 the commit captured a state file (the pre-commit hook was not active or was bypassed) — run the bare-branch fallback NOW before pushing or writing any verdict; do not defer this recovery to the verifier.
  - Startup exit-1 is a hard stop with one required action: if `check-startup-protocol.sh` exits 1 for any reason, the next and only command to run is the bare-branch fallback `git push --force origin origin/main:refs/heads/$(git rev-parse --abbrev-ref HEAD)`; do not read the spec, do not open implementation files, do not run git log, do not write any findings — re-run startup and wait for exit 0 before doing anything else.

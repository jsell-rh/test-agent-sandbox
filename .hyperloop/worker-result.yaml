### Observations

- No production code was changed; risk is essentially zero.
- Tests follow established conventions (`seedTodo`, `seedCompletedTodo`,
  `jsonBody`, `json`, `req` helpers).
- The `active→active` idempotency case is not explicitly listed in the spec's
  TDD plan but is the natural symmetric partner of the explicitly required
  `completed→completed` idempotency case. The implementation documents it as
  a deliberate invariant.
- Pre-existing app-layer test failures caused by the missing `.nuxt/tsconfig.json`
  (Nuxt types not generated) are an environment setup issue unrelated to this
  branch; they resolved after running `npx nuxt prepare`.

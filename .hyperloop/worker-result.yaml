## Review Summary

### What this PR does

Adds two edge-case tests to the existing `PATCH /api/todos/:id` suite in
`server/api/todos/todos.test.ts`. The implementation (`[id].patch.ts`) already
existed on `main`; this branch supplies the missing test coverage.

### Tests Added

1. **`status: "active" on already-active todo returns 200 (idempotent)`**
   - Seeds an active todo and PATCHes it with `{ status: 'active' }`.
   - Verifies 200 + `status: "active"` in response.
   - The domain's `reopen()` method explicitly handles this as a no-op
     (`if (this._status === TodoStatus.active) return`), so the test
     exercises real, documented behaviour.
   - Symmetric counterpart to the pre-existing
     `status: "completed" on already-completed todo` case required by the spec.

2. **`non-string title returns 400 BAD_REQUEST`**
   - Seeds a valid todo and PATCHes it with `{ title: 42 }`.
   - Verifies 400 + `error: "BAD_REQUEST"`.
   - The implementation guards with `typeof body.title !== 'string'` before
     calling `todo.updateTitle()`, so this test is not vacuous.
   - Consistent with the POST handler's identical type guard, and with the
     spec's BAD_REQUEST (400) category for malformed body fields.


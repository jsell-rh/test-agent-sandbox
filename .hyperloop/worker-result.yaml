All 235 tests pass (157 UI + 78 server-side API tests).

Task-012 adds two additional test cases to `server/api/todos/todos.test.ts` that were missing from main:

1. `status: "active" on already-active todo returns 200 (idempotent)` — verifies that reopening an already-active todo is idempotent and returns HTTP 200 with the correct status.
2. `non-string title returns 400 BAD_REQUEST` — verifies that the PATCH handler type-guards the `title` field and rejects non-string values with HTTP 400.

Both tests pass against the existing implementation which already handles these cases correctly:
- The domain `Todo.reopen()` method is idempotent by design (no error thrown on already-active todo).
- The PATCH handler includes a `typeof body.title !== 'string'` guard that throws 400 BAD_REQUEST.


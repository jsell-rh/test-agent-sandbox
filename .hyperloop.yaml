target:
  base_branch: main

runtime: ambient
max_workers: 5
repo: jsell-rh/test-agent-sandbox
ambient:                     # required when runtime: ambient                                                                                            
  project_id: test-hyperloop                                                                                                                         
  acpctl: /home/jsell/bin/acpctl    
  repo_url: https://github.com/jsell-rh/test-agent-sandbox  
          # path to acpctl binary      

merge:
  auto_merge: true
  strategy: squash

observability:
  log_level: debug 
  matrix:
    homeserver: https://matrix.jsksell.com
    registration_token_env: MATRIX_ACCESS_TOKEN
    invite_user: "@jsell:matrix.jsksell.com"
    verbose: true
